name: release

# A tag is the only thing that makes a release. There is no
# workflow_dispatch on purpose: with one, "which commit is v1.2.0" would
# have two answers.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          # goreleaser builds the changelog from history.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      # Deliberately repeated from ci.yml: a release is its own workflow, and
      # it must not depend on someone having looked at another one's result.
      - run: go vet ./...
      - run: go test ./internal/... .

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
